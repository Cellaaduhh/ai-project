<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yogzz AI Premium</title>
    <style>
        :root {
            --accent: #0ea5e9;
            --bg-dark: #0f172a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }

        body { 
            background: #1e293b;
            /* Latar Belakang Berpola */
            background-image: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                              url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            position: relative;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .header {
            padding: 20px;
            background: rgba(15, 23, 42, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 15px;
            color: white;
        }

        .ai-logo {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, #0ea5e9, #6366f1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 1.5rem;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.5);
        }

        #scroll-box {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 100px; /* Ruang buat input */
        }

        .msg {
            padding: 12px 18px;
            border-radius: 20px;
            max-width: 85%;
            font-size: 1rem;
            line-height: 1.5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .ai { background: #334155; color: #f1f5f9; align-self: flex-start; border-bottom-left-radius: 2px; }
        .user { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* INPUT BAR - INI YANG KITA FIX */
        .input-bar {
            position: fixed; /* Pakai Fixed biar nggak kabur */
            bottom: 0;
            width: 100%;
            max-width: 500px;
            padding: 15px;
            background: #1e293b;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            z-index: 9999; /* Paling atas! */
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .input-wrapper {
            flex: 1;
            background: #334155;
            border-radius: 25px;
            padding: 0 15px;
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        .btn-send {
            background: #0ea5e9;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="header">
        <div class="ai-logo">Y</div>
        <b style="font-size: 1.3rem;">Yogzz AI</b>
    </div>

    <div id="scroll-box">
        <div class="msg ai">Halo Yogzz! Sekarang tampilannya sudah fix dan anti-polos. Coba ketik sesuatu!</div>
    </div>

    <div class="input-bar">
        <div class="input-wrapper">
            <input type="text" id="msg-input" placeholder="Tulis pesan...">
        </div>
        <button class="btn-send" onclick="handleSend()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    const API_AI = "https://api.siputzx.my.id/api/ai/gemini-lite?prompt=";

    async function handleSend() {
        const inp = document.getElementById('msg-input');
        const text = inp.value.trim();
        if(!text) return;

        addMsg(text, 'user');
        inp.value = "";

        try {
            const res = await fetch(API_AI + encodeURIComponent(text));
            const json = await res.json();
            // Ambil teks hasil AI
            const reply = json.data?.parts?.[0]?.text || "Error respon.";
            addMsg(reply, 'ai');
        } catch(e) {
            addMsg("Koneksi bermasalah, Yogzz.", 'ai');
        }
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        document.getElementById('scroll-box').appendChild(d);
        const box = document.getElementById('scroll-box');
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => {
        if(e.key === 'Enter') handleSend();
    });
</script>

</body>
</html>
