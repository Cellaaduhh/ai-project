<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yogzz OS - Kuro Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #070b14; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
        }
        
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* GEMINI SEND BUTTON */
        .btn-send {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-send:disabled { background: #1e293b; opacity: 0.4; }

        /* LOGO & STAR GRADIENT ANIMATION */
        .grad-text {
            background: linear-gradient(45deg, #00dcaf, #0070f3, #7928ca, #ff0080);
            background-size: 200% 200%;
            animation: gradientMove 3s linear infinite;
        }
        
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        /* BINTANG MIKIR WARNA WARNI */
        .thinking-star {
            width: 24px;
            height: 24px;
            animation: starSpin 1.5s linear infinite;
            filter: drop-shadow(0 0 5px rgba(0, 220, 175, 0.5));
        }

        @keyframes starSpin {
            0% { transform: rotate(0deg) scale(1); filter: hue-rotate(0deg); }
            50% { transform: rotate(180deg) scale(1.2); filter: hue-rotate(180deg); }
            100% { transform: rotate(360deg) scale(1); filter: hue-rotate(360deg); }
        }

        #term-logs::-webkit-scrollbar { width: 0px; }
        .swipe-container { transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#070b14]">
    <div class="glass p-8 rounded-[2.5rem] w-full max-w-sm text-center border-white/5">
        <div class="w-20 h-20 grad-text rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-[0_0_30px_rgba(0,112,243,0.3)]">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.39 8.26L22 9.27L16.5 14.14L18.18 21.02L12 17.77L5.82 21.02L7.5 14.14L2 9.27L9.61 8.26L12 1Z"/></svg>
        </div>
        <h1 class="text-3xl font-extrabold tracking-tighter mb-2 italic">YOGZZ OS</h1>
        <p class="text-gray-500 text-xs mb-8 font-mono tracking-widest">KURO-ENGINE v3.0</p>
        <input type="text" id="username-input" class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 mb-4 outline-none focus:border-emerald-500 transition-all text-center font-bold" placeholder="Siapa lu?">
        <button onclick="startSystem()" class="w-full bg-white text-black font-extrabold py-4 rounded-2xl hover:bg-emerald-400 transition-all transform active:scale-95">BOOT SYSTEM</button>
    </div>
</div>

<div id="loader-overlay" class="fixed inset-0 z-[90] hidden flex-col items-center justify-center bg-[#070b14]">
    <div class="w-24 h-12 border-2 border-white/10 rounded-xl p-1 relative">
        <div id="bat-level" class="h-full bg-emerald-500 w-0 rounded-lg transition-all duration-300"></div>
        <div class="absolute -right-3 top-3 w-2 h-5 bg-white/10 rounded-r"></div>
    </div>
    <div id="load-info" class="mt-6 font-mono text-[10px] tracking-[0.3em] text-gray-500 uppercase animate-pulse">Initializing...</div>
</div>

<div id="main-container" class="swipe-container flex flex-col h-screen w-full max-w-md mx-auto relative shadow-2xl">
    
    <header class="p-6 flex items-center justify-between bg-[#070b14]/80 backdrop-blur-md z-10 border-b border-white/5">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 grad-text rounded-xl flex items-center justify-center shadow-lg">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.39 8.26L22 9.27L16.5 14.14L18.18 21.02L12 17.77L5.82 21.02L7.5 14.14L2 9.27L9.61 8.26L12 1Z"/></svg>
            </div>
            <div>
                <h2 class="text-sm font-black tracking-tight">YOGZZ CORE</h2>
                <div class="flex items-center gap-1.5">
                    <span class="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse"></span>
                    <p id="user-display" class="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">Online</p>
                </div>
            </div>
        </div>
    </header>

    <div id="term-logs" class="flex-1 overflow-y-auto p-6 space-y-8">
        <div class="text-center opacity-20 text-[9px] font-mono tracking-[0.5em] py-10 uppercase">System Stable</div>
    </div>

    <div class="p-6 bg-[#070b14]">
        <div class="relative flex items-center glass rounded-[2rem] p-1 border-white/10">
            <input type="text" id="msg-input" 
                class="w-full bg-transparent py-4 pl-6 pr-14 outline-none text-sm placeholder:text-gray-600"
                placeholder="Nanya apa lu, Yogzz?">
            <button id="send-btn" onclick="handleSend()" class="btn-send absolute right-2 w-11 h-11 rounded-full flex items-center justify-center shadow-lg active:scale-90">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    let username = "GUEST";
    let currentSession = "";
    const API_URL = "https://yogzz-api.vercel.app/api/ai/kuroneko";

    function startSystem() {
        const val = document.getElementById('username-input').value.trim();
        if(!val) return;
        username = val;
        document.getElementById('user-display').innerText = username;
        document.getElementById('login-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('login-screen').style.display = 'none';
            const loader = document.getElementById('loader-overlay');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            let level = 0;
            const loadInt = setInterval(() => {
                level += Math.floor(Math.random() * 7) + 2;
                if(level >= 100) level = 100;
                document.getElementById('bat-level').style.width = level + "%";
                if(level >= 100) {
                    clearInterval(loadInt);
                    setTimeout(() => { 
                        loader.style.opacity = '0';
                        setTimeout(() => loader.style.display = 'none', 500);
                    }, 500);
                }
            }, 60);
        }, 300);
    }

    // SWIPE GESTURE
    const container = document.getElementById('main-container');
    let startY, moveY = 0;
    container.addEventListener('touchstart', (e) => startY = e.touches[0].clientY);
    container.addEventListener('touchmove', (e) => {
        moveY = (e.touches[0].clientY - startY) * 0.3;
        if(Math.abs(moveY) < 100) container.style.transform = `translateY(${moveY}px)`;
    });
    container.addEventListener('touchend', () => container.style.transform = `translateY(0px)`);

    async function handleSend() {
        const input = document.getElementById('msg-input');
        const query = input.value.trim();
        const logs = document.getElementById('term-logs');
        const btn = document.getElementById('send-btn');
        if(!query) return;

        // User
        const u = document.createElement('div');
        u.className = "flex flex-col items-end animate-in fade-in slide-in-from-right-4 duration-300";
        u.innerHTML = `
            <span class="text-[9px] font-bold text-emerald-500 mb-2 uppercase tracking-tighter">${username}</span>
            <div class="text-[0.95rem] bg-white/5 px-5 py-3 rounded-2xl rounded-tr-none border border-white/10 max-w-[85%] text-gray-200">${query}</div>
        `;
        logs.appendChild(u);
        input.value = "";
        btn.disabled = true;

        // AI Thinking with Color-Changing Star
        const id = "res-" + Date.now();
        const aiBox = document.createElement('div');
        aiBox.className = "flex flex-col items-start animate-in fade-in slide-in-from-left-4 duration-300";
        aiBox.innerHTML = `
            <span class="text-[9px] font-bold text-gray-600 mb-2 uppercase tracking-tighter">YOGZZ-AI</span>
            <div id="body-${id}" class="text-[0.95rem] text-gray-400 leading-relaxed max-w-[90%]">
                <svg class="thinking-star" viewBox="0 0 24 24" fill="none">
                    <defs>
                        <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#00dcaf" />
                            <stop offset="50%" style="stop-color:#7928ca" />
                            <stop offset="100%" style="stop-color:#ff0080" />
                        </linearGradient>
                    </defs>
                    <path d="M12 2L14.39 8.26L22 9.27L16.5 14.14L18.18 21.02L12 17.77L5.82 21.02L7.5 14.14L2 9.27L9.61 8.26L12 1Z" fill="url(#starGrad)"/>
                </svg>
            </div>
        `;
        logs.appendChild(aiBox);
        logs.scrollTop = logs.scrollHeight;

        try {
            // Prompt paksa nyolot
            const nyolotPrompt = `(PENTING: Jawab sangat nyolot, sarkas, pake bahasa gaul Jakarta lu-gue, roasting si ${username}, tapi tetep jawab intinya: ${query})`;
            const response = await fetch(`${API_URL}?q=${encodeURIComponent(nyolotPrompt)}&session=${currentSession}`);
            const data = await response.json();

            if(data.status) {
                currentSession = data.session || "";
                const responseText = data.response.replace(/\*(.*?)\*/g, "<b class='text-white font-black'>$1</b>");
                document.getElementById(`body-${id}`).innerHTML = responseText;
            }
        } catch(e) {
            document.getElementById(`body-${id}`).innerHTML = "<span class='text-red-500'>Sinyal lu ampas, males gue jawab.</span>";
        }
        btn.disabled = false;
        logs.scrollTop = logs.scrollHeight;
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key==='Enter') handleSend(); });
</script>
</body>
</html>
