<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yogzz OS - v2.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { 
            background-color: #070b14; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #e2e8f0;
            overflow: hidden;
            touch-action: none;
        }
        .font-mono { font-family: 'Fira Code', monospace; }
        
        /* LOGIN GLASSMORPHISM */
        .glass {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* GEMINI SEND BUTTON STYLE */
        .btn-gemini {
            background: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-gemini:disabled {
            background: #1e293b;
            opacity: 0.5;
        }

        /* CHAT AREA CUSTOM SCROLL */
        #term-logs::-webkit-scrollbar { width: 4px; }
        #term-logs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }

        .logo-anim {
            background: linear-gradient(45deg, #00dcaf, #0070f3, #7928ca, #ff0080);
            background-size: 200% 200%;
            animation: gradientMove 4s ease infinite;
        }
        @keyframes gradientMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .swipe-container { transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
    </style>
</head>
<body>

<div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-[#070b14]">
    <div class="glass p-8 rounded-[2rem] w-full max-w-sm text-center">
        <div class="w-16 h-16 logo-anim rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-2xl">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.39 8.26L22 9.27L16.5 14.14L18.18 21.02L12 17.77L5.82 21.02L7.5 14.14L2 9.27L9.61 8.26L12 1Z"/></svg>
        </div>
        <h1 class="text-2xl font-extrabold tracking-tight mb-2">YOGZZ-SYSTEM</h1>
        <p class="text-gray-400 text-sm mb-8">Identify yourself to proceed.</p>
        <input type="text" id="username-input" class="w-full bg-[#0f172a] border border-white/10 rounded-xl px-5 py-3 mb-4 outline-none focus:border-emerald-500 transition-all text-center" placeholder="Username...">
        <button onclick="startSystem()" class="w-full bg-white text-black font-bold py-3 rounded-xl hover:bg-emerald-400 transition-colors">ACCESS CORE</button>
    </div>
</div>

<div id="loader-overlay" class="fixed inset-0 z-[90] hidden flex-col items-center justify-center bg-[#070b14]">
    <div class="w-20 h-10 border-2 border-white/20 rounded-lg p-1 relative">
        <div id="bat-level" class="h-full bg-emerald-500 w-0 transition-all"></div>
        <div class="absolute -right-3 top-2 w-2 h-4 bg-white/20 rounded-r"></div>
    </div>
    <div id="load-info" class="mt-4 font-mono text-[10px] tracking-widest text-gray-500 uppercase">Booting...</div>
</div>

<div id="main-container" class="swipe-container flex flex-col h-screen w-full max-w-md mx-auto glass border-x-0 md:border-x">
    
    <header class="p-5 flex items-center justify-between border-bottom border-white/5 bg-[#070b14]/50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 logo-anim rounded-xl flex items-center justify-center shadow-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.39 8.26L22 9.27L16.5 14.14L18.18 21.02L12 17.77L5.82 21.02L7.5 14.14L2 9.27L9.61 8.26L12 1Z"/></svg>
            </div>
            <div>
                <h2 class="text-sm font-extrabold tracking-wide">YOGZZ CORE</h2>
                <p id="user-display" class="text-[10px] text-emerald-500 font-bold uppercase tracking-tighter">● Online</p>
            </div>
        </div>
        <div class="text-gray-500">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 10c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 12c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
    </header>

    <div id="term-logs" class="flex-1 overflow-y-auto p-6 space-y-6">
        <div class="text-center py-4 text-gray-600 text-[10px] font-mono">[ ENCRYPTION ENABLED ]</div>
    </div>

    <div class="p-4 pb-8 bg-[#070b14]">
        <div class="relative flex items-center">
            <input type="text" id="msg-input" 
                class="w-full bg-[#111827] border border-white/5 rounded-2xl py-4 pl-5 pr-14 outline-none focus:border-white/20 transition-all text-sm"
                placeholder="Tanya apa lu...">
            <button id="send-btn" onclick="handleSend()" class="btn-gemini absolute right-2 w-10 h-10 rounded-xl flex items-center justify-center">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>
</div>

<script>
    let username = "GUEST";
    let currentSession = "";
    const API_URL = "https://yogzz-api.vercel.app/api/ai/kuroneko";

    // LOGIN & LOADING
    function startSystem() {
        const val = document.getElementById('username-input').value.trim();
        if(!val) return;
        username = val;
        document.getElementById('user-display').innerText = `● USER: ${username}`;
        document.getElementById('login-screen').style.display = 'none';
        const loader = document.getElementById('loader-overlay');
        loader.classList.remove('hidden');
        loader.classList.add('flex');

        let level = 0;
        const loadInt = setInterval(() => {
            level += 5;
            document.getElementById('bat-level').style.width = level + "%";
            document.getElementById('load-info').innerText = `Syncing Database... ${level}%`;
            if(level >= 100) {
                clearInterval(loadInt);
                setTimeout(() => { 
                    loader.style.opacity = '0';
                    setTimeout(() => loader.style.display = 'none', 500);
                }, 500);
            }
        }, 30);
    }

    // GESTURE GESER (DRAGGABLE)
    const container = document.getElementById('main-container');
    let startY, moveY = 0;
    
    container.addEventListener('touchstart', (e) => startY = e.touches[0].clientY);
    container.addEventListener('touchmove', (e) => {
        moveY = (e.touches[0].clientY - startY) * 0.4;
        if(moveY > 80) moveY = 80;
        if(moveY < -80) moveY = -80;
        container.style.transform = `translateY(${moveY}px)`;
    });
    container.addEventListener('touchend', () => {
        container.style.transform = `translateY(0px)`;
    });

    // CHAT LOGIC
    async function handleSend() {
        const query = document.getElementById('msg-input').value.trim();
        const logs = document.getElementById('term-logs');
        const btn = document.getElementById('send-btn');
        if(!query) return;

        // User Entry (Clean Style)
        const u = document.createElement('div');
        u.className = "flex flex-col items-end";
        u.innerHTML = `
            <span class="text-[10px] font-mono text-emerald-500 mb-1 uppercase tracking-widest">${username}</span>
            <div class="text-sm bg-white/5 px-4 py-2 rounded-2xl rounded-tr-none border border-white/10 max-w-[85%]">${query}</div>
        `;
        logs.appendChild(u);
        document.getElementById('msg-input').value = "";
        btn.disabled = true;

        // AI Response Placeholder
        const id = "res-" + Date.now();
        const aiBox = document.createElement('div');
        aiBox.className = "flex flex-col items-start";
        aiBox.innerHTML = `
            <span class="text-[10px] font-mono text-gray-500 mb-1 uppercase tracking-widest">YOGZZ-AI</span>
            <div id="body-${id}" class="text-sm text-gray-300 leading-relaxed max-w-[90%] flex items-center gap-2">
                <div class="flex gap-1">
                    <div class="w-1 h-1 bg-emerald-500 animate-bounce"></div>
                    <div class="w-1 h-1 bg-emerald-500 animate-bounce [animation-delay:-0.15s]"></div>
                    <div class="w-1 h-1 bg-emerald-500 animate-bounce [animation-delay:-0.3s]"></div>
                </div>
            </div>
        `;
        logs.appendChild(aiBox);
        logs.scrollTop = logs.scrollHeight;

        try {
            // Kita paksa KuroNeko buat makin nyolot lewat query prompt
            const nyolotPrompt = `(PENTING: Jawab sangat nyolot, galak, pake bahasa lu-gue, ejek si ${username}, tapi tetep jawab pertanyaannya: ${query})`;
            const response = await fetch(`${API_URL}?q=${encodeURIComponent(nyolotPrompt)}&session=${currentSession}`);
            const data = await response.json();

            if(data.status) {
                currentSession = data.session || "";
                document.getElementById(`body-${id}`).innerHTML = data.response.replace(/\*(.*?)\*/g, "<b class='text-white font-bold'>$1</b>");
            }
        } catch(e) {
            document.getElementById(`body-${id}`).innerText = "Koneksi bapuk, lagi males gue.";
        }
        btn.disabled = false;
        logs.scrollTop = logs.scrollHeight;
    }

    document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key==='Enter') handleSend(); });
</script>
</body>
</html>
