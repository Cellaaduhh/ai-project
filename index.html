<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YogzzJS AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #080b12;
      --bg-secondary: #0d1117;
      --bg-tertiary: #161b24;
      --bg-hover: #1c2333;
      --border: #21293a;
      --border-light: #2a3448;
      --text-primary: #e8edf5;
      --text-secondary: #7a8ba8;
      --text-muted: #3d4f6a;
      --accent: #3b82f6;
      --accent-2: #6366f1;
      --accent-dim: rgba(59,130,246,0.10);
      --accent-hover: #60a5fa;
      --user-bubble: #111827;
      --user-border: #1e3a5f;
      --ai-bubble: #0d1117;
      --green: #34d399;
      --red: #f87171;
    }

    html, body { height: 100%; font-family: 'Sora', sans-serif; background: var(--bg-primary); color: var(--text-primary); }

    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 264px; min-width: 264px; background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      transition: transform .3s cubic-bezier(.4,0,.2,1);
    }

    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }

    /* ── BRAND LOGO SVG ── */
    .brand-logo {
      width: 34px; height: 34px; flex-shrink: 0;
    }

    .brand-name {
      font-size: 16px; font-weight: 700; letter-spacing: -.5px;
      background: linear-gradient(135deg, #3b82f6 0%, #818cf8 60%, #a78bfa 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .new-chat-btn {
      margin: 12px; padding: 10px 14px; background: var(--bg-tertiary);
      border: 1px solid var(--border); border-radius: 10px; cursor: pointer;
      font-size: 13px; font-family: 'Sora', sans-serif; color: var(--text-primary);
      display: flex; align-items: center; gap: 8px; transition: all .2s;
    }
    .new-chat-btn:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--accent-hover); }
    .new-chat-btn svg { flex-shrink: 0; }

    .sidebar-section-label {
      padding: 14px 16px 6px; font-size: 10.5px; font-weight: 600;
      color: var(--text-muted); letter-spacing: .1em; text-transform: uppercase;
    }

    .history-list { flex: 1; overflow-y: auto; padding: 0 8px 16px; }
    .history-list::-webkit-scrollbar { width: 3px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .history-item {
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12.5px; color: var(--text-secondary); white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; transition: all .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .history-item svg { flex-shrink: 0; opacity: .5; }
    .history-item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .history-item.active { background: var(--accent-dim); color: var(--text-primary); border: 1px solid rgba(59,130,246,.15); }

    .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
    .session-badge {
      background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; font-size: 11px; color: var(--text-muted);
      display: flex; align-items: center; gap: 7px;
    }
    .session-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green);
      flex-shrink: 0; animation: pulse 2.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(52,211,153,.4)} 50%{opacity:.6;box-shadow:0 0 0 4px rgba(52,211,153,0)} }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* ── TOPBAR ── */
    .topbar {
      padding: 13px 22px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,11,18,.85); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .topbar-left { display: flex; align-items: center; gap: 12px; }
    .hamburger {
      display: none; background: none; border: none;
      color: var(--text-secondary); cursor: pointer; padding: 5px; border-radius: 6px;
      transition: background .15s;
    }
    .hamburger:hover { background: var(--bg-tertiary); }

    .model-badge {
      display: flex; align-items: center; gap: 7px; padding: 6px 13px;
      background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px;
      font-size: 12px; font-weight: 500; color: var(--text-secondary);
    }
    .model-badge .badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }
    .topbar-right { font-size: 13px; color: var(--text-muted); }

    /* ── CHAT AREA ── */
    .chat-wrapper { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .chat-wrapper::-webkit-scrollbar { width: 5px; }
    .chat-wrapper::-webkit-scrollbar-track { background: transparent; }
    .chat-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-inner { max-width: 800px; margin: 0 auto; padding: 28px 24px 40px; }

    /* ── WELCOME ── */
    .welcome {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 62vh; text-align: center; padding: 40px 20px; animation: fadeUp .5s ease;
    }

    .welcome-logo-wrap {
      position: relative; margin-bottom: 24px;
    }
    .welcome-logo-bg {
      width: 72px; height: 72px; border-radius: 18px;
      background: linear-gradient(135deg, #1e3a5f 0%, #1e1b4b 100%);
      border: 1px solid rgba(99,102,241,.3);
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 40px rgba(59,130,246,.15), 0 8px 32px rgba(0,0,0,.4);
    }
    .welcome-logo-ring {
      position: absolute; inset: -6px; border-radius: 24px;
      border: 1px solid rgba(99,102,241,.15);
      animation: ring-pulse 3s ease-in-out infinite;
    }
    @keyframes ring-pulse { 0%,100%{opacity:.5;transform:scale(1)} 50%{opacity:.1;transform:scale(1.04)} }

    .welcome h1 { font-size: 28px; font-weight: 700; letter-spacing: -.5px; margin-bottom: 10px; }
    .welcome h1 .brand { background: linear-gradient(135deg, #3b82f6, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 420px; line-height: 1.7; margin-bottom: 32px; }

    .suggestion-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; max-width: 520px; }
    .suggestion-card {
      background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 16px; cursor: pointer; text-align: left; transition: all .2s;
      font-family: 'Sora', sans-serif; display: flex; gap: 10px; align-items: flex-start;
    }
    .suggestion-card:hover { border-color: rgba(59,130,246,.4); background: var(--accent-dim); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(59,130,246,.08); }
    .suggestion-card .s-icon { flex-shrink: 0; width: 30px; height: 30px; border-radius: 7px; background: var(--bg-tertiary); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-top: 1px; }
    .suggestion-card .s-text { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }

    /* ── MESSAGES ── */
    .message { display: flex; gap: 12px; padding: 10px 0; animation: fadeUp .3s ease; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
    .message.user { flex-direction: row-reverse; }

    /* AI Avatar — pure SVG icon */
    .avatar {
      width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; margin-top: 2px;
    }
    .avatar.ai {
      background: linear-gradient(135deg, #1e3a8a 0%, #3730a3 100%);
      border: 1px solid rgba(99,102,241,.35);
      box-shadow: 0 2px 8px rgba(59,130,246,.2);
    }
    .avatar.user {
      background: var(--bg-tertiary); border: 1px solid var(--border-light);
    }

    .bubble {
      max-width: calc(100% - 50px); padding: 12px 16px; border-radius: 14px;
      line-height: 1.75; font-size: 14px;
    }
    .message.ai .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 3px; }
    .message.user .bubble { background: var(--user-bubble); border: 1px solid var(--user-border); border-top-right-radius: 3px; }

    .bubble p { margin: 0 0 10px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble h1,.bubble h2,.bubble h3 { margin: 14px 0 6px; font-weight: 600; color: #fff; }
    .bubble h1 { font-size: 18px; } .bubble h2 { font-size: 16px; } .bubble h3 { font-size: 14px; }
    .bubble ul,.bubble ol { padding-left: 20px; margin: 6px 0 10px; }
    .bubble li { margin: 4px 0; }
    .bubble strong { font-weight: 600; color: #fff; }
    .bubble em { font-style: italic; color: var(--text-secondary); }
    .bubble code { font-family: 'JetBrains Mono', monospace; font-size: 12px; background: #131929; color: #818cf8; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(99,102,241,.2); }
    .bubble pre { margin: 10px 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
    .bubble pre code { background: transparent; color: inherit; padding: 0; border-radius: 0; font-size: 12.5px; border: none; }
    .bubble blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--text-secondary); margin: 8px 0; }
    .bubble hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
    .bubble a { color: var(--accent-hover); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }
    .bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
    .bubble th,.bubble td { border: 1px solid var(--border); padding: 7px 12px; }
    .bubble th { background: var(--bg-tertiary); font-weight: 600; }

    .code-block-wrap { position: relative; }
    .code-header {
      display: flex; align-items: center; justify-content: space-between;
      background: #0d1117; padding: 8px 14px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-muted); border-radius: 9px 9px 0 0;
      border-bottom: 1px solid var(--border);
    }
    .copy-btn {
      background: none; border: 1px solid var(--border); color: var(--text-secondary);
      padding: 3px 9px; border-radius: 5px; cursor: pointer; font-size: 10px;
      font-family: 'Sora', sans-serif; transition: all .18s; display: flex; align-items: center; gap: 4px;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* typing dots */
    .typing-dots { display: flex; gap: 5px; padding: 4px 0; align-items: center; }
    .typing-dots span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
      animation: bounce 1.3s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: .18s; }
    .typing-dots span:nth-child(3) { animation-delay: .36s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0);opacity:.6} 30%{transform:translateY(-5px);opacity:1} }

    .msg-actions { display: flex; gap: 4px; margin-top: 5px; opacity: 0; transition: opacity .2s; }
    .message:hover .msg-actions { opacity: 1; }
    .action-btn {
      background: none; border: 1px solid transparent; color: var(--text-muted);
      padding: 4px 8px; border-radius: 6px; cursor: pointer; font-size: 11px;
      font-family: 'Sora', sans-serif; transition: all .18s; display: flex; align-items: center; gap: 4px;
    }
    .action-btn:hover { border-color: var(--border-light); color: var(--text-primary); background: var(--bg-tertiary); }

    /* ── INPUT ── */
    .input-area {
      padding: 14px 22px 20px; border-top: 1px solid var(--border);
      background: rgba(8,11,18,.9); backdrop-filter: blur(12px);
    }
    .input-inner { max-width: 800px; margin: 0 auto; }
    .input-box {
      display: flex; align-items: flex-end; gap: 10px;
      background: var(--bg-secondary); border: 1px solid var(--border-light);
      border-radius: 14px; padding: 10px 10px 10px 16px; transition: border-color .2s, box-shadow .2s;
    }
    .input-box:focus-within {
      border-color: rgba(59,130,246,.5);
      box-shadow: 0 0 0 3px rgba(59,130,246,.08);
    }
    textarea {
      flex: 1; background: none; border: none; outline: none; resize: none;
      font-family: 'Sora', sans-serif; font-size: 14px; color: var(--text-primary);
      max-height: 160px; min-height: 24px; line-height: 1.6; padding: 2px 0;
    }
    textarea::placeholder { color: var(--text-muted); }
    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .send-btn {
      width: 36px; height: 36px; border-radius: 9px; border: none; cursor: pointer;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; flex-shrink: 0; box-shadow: 0 2px 10px rgba(59,130,246,.3);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 16px rgba(59,130,246,.4); }
    .send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; box-shadow: none; }

    .input-footer { margin-top: 9px; text-align: center; font-size: 11px; color: var(--text-muted); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(8px);
      background: var(--bg-tertiary); border: 1px solid var(--border-light);
      color: var(--text-primary); padding: 8px 16px; border-radius: 8px; font-size: 12px;
      opacity: 0; transition: all .22s; pointer-events: none; z-index: 999;
      display: flex; align-items: center; gap: 6px;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── MOBILE ── */
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 10; }

    @media (max-width: 700px) {
      .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 20; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); box-shadow: 4px 0 40px rgba(0,0,0,.6); }
      .sidebar-overlay.show { display: block; }
      .hamburger { display: flex; }
      .suggestion-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ══ SIDEBAR ══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <!-- Brand Logo SVG -->
      <svg class="brand-logo" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="34" height="34" rx="9" fill="url(#logoGrad)"/>
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="34" y2="34" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#4f46e5"/>
          </linearGradient>
        </defs>
        <!-- Y shape -->
        <path d="M10 9 L17 18 L24 9" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <line x1="17" y1="18" x2="17" y2="26" stroke="white" stroke-width="2.2" stroke-linecap="round"/>
        <!-- circuit dot accent -->
        <circle cx="17" cy="18" r="2" fill="#93c5fd"/>
      </svg>
      <div class="brand-name">YogzzJS</div>
    </div>

    <button class="new-chat-btn" onclick="newChat()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Chat Baru
    </button>

    <div class="sidebar-section-label">Riwayat</div>
    <div class="history-list" id="historyList"></div>

    <div class="sidebar-footer">
      <div class="session-badge">
        <div class="session-dot"></div>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
          <span style="color:var(--text-muted)">Session&nbsp;</span>
          <span id="sessionDisplay" style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-secondary)"></span>
        </span>
      </div>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <!-- ══ MAIN ══ -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-left">
        <button class="hamburger" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/></svg>
        </button>
        <div class="model-badge">
          <div class="badge-dot"></div>
          YogzzJS AI
        </div>
      </div>
      <div class="topbar-right" id="chatTitle">Percakapan Baru</div>
    </div>

    <div class="chat-wrapper" id="chatWrapper">
      <div class="chat-inner" id="chatInner">

        <!-- WELCOME -->
        <div class="welcome" id="welcomeScreen">
          <div class="welcome-logo-wrap">
            <div class="welcome-logo-ring"></div>
            <div class="welcome-logo-bg">
              <!-- Large brand mark SVG -->
              <svg width="38" height="38" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 8 L19 21 L29 8" stroke="#93c5fd" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                <line x1="19" y1="21" x2="19" y2="32" stroke="#93c5fd" stroke-width="2.8" stroke-linecap="round"/>
                <circle cx="19" cy="21" r="3" fill="#3b82f6"/>
                <circle cx="9" cy="8" r="1.8" fill="#6366f1" opacity=".6"/>
                <circle cx="29" cy="8" r="1.8" fill="#6366f1" opacity=".6"/>
              </svg>
            </div>
          </div>
          <h1>Selamat datang di <span class="brand">YogzzJS AI</span></h1>
          <p>Asisten AI cerdas yang siap membantu kamu dengan berbagai pertanyaan, pemrograman, ide kreatif, dan tugas sehari-hari.</p>
          <div class="suggestion-grid">
            <button class="suggestion-card" onclick="useSuggestion(this)">
              <div class="s-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
              </div>
              <div class="s-text">Buatkan fungsi JavaScript untuk memvalidasi email</div>
            </button>
            <button class="suggestion-card" onclick="useSuggestion(this)">
              <div class="s-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2" stroke-linecap="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
              </div>
              <div class="s-text">Bantu saya menulis email profesional ke klien</div>
            </button>
            <button class="suggestion-card" onclick="useSuggestion(this)">
              <div class="s-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="s-text">Jelaskan perbedaan REST API dan GraphQL</div>
            </button>
            <button class="suggestion-card" onclick="useSuggestion(this)">
              <div class="s-icon">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#34d399" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </div>
              <div class="s-text">Buat landing page HTML modern dengan CSS grid</div>
            </button>
          </div>
        </div>

      </div>
    </div>

    <div class="input-area">
      <div class="input-inner">
        <div class="input-box">
          <textarea id="msgInput" rows="1" placeholder="Kirim pesan ke YogzzJS AI..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
          <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Kirim">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
        <div class="input-footer">YogzzJS AI dapat membuat kesalahan. Periksa kembali informasi penting.</div>
      </div>
    </div>
  </main>
</div>

<div class="toast" id="toast">
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<!-- SVG SYMBOLS — reusable icons rendered via JS -->
<svg style="display:none">
  <!-- AI avatar icon -->
  <symbol id="icon-ai-avatar" viewBox="0 0 20 20">
    <path d="M5 4 L10 12 L15 4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <line x1="10" y1="12" x2="10" y2="18" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
    <circle cx="10" cy="12" r="2" fill="#93c5fd"/>
  </symbol>
  <!-- User avatar icon -->
  <symbol id="icon-user-avatar" viewBox="0 0 20 20">
    <circle cx="10" cy="7" r="3.5" stroke="#7a8ba8" stroke-width="1.8" fill="none"/>
    <path d="M3 18c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="#7a8ba8" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  </symbol>
  <!-- Chat history icon -->
  <symbol id="icon-chat" viewBox="0 0 16 16">
    <path d="M14 9.667A1.333 1.333 0 0112.667 11H4.667L2 13.667V3.333A1.333 1.333 0 013.333 2h9.334A1.333 1.333 0 0114 3.333v6.334z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </symbol>
</svg>

<script>
const API_BASE = 'https://calista-newapi.vercel.app/api/ai/kuroneko';
let session = localStorage.getItem('yogzzjs_session') || generateSession();
let conversations = JSON.parse(localStorage.getItem('yogzzjs_convs') || '[]');
let currentConvId = null;
let isLoading = false;

localStorage.setItem('yogzzjs_session', session);
document.getElementById('sessionDisplay').textContent = session;

function generateSession() {
  return 'ygz_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
}

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}

// ── HISTORY ──
function renderHistory() {
  const list = document.getElementById('historyList');
  list.innerHTML = '';
  if (!conversations.length) {
    list.innerHTML = '<div style="padding:10px 12px;font-size:12px;color:var(--text-muted)">Belum ada riwayat percakapan</div>';
    return;
  }
  [...conversations].reverse().forEach(conv => {
    const el = document.createElement('div');
    el.className = 'history-item' + (conv.id === currentConvId ? ' active' : '');
    el.innerHTML = `<svg width="13" height="13"><use href="#icon-chat"/></svg><span style="overflow:hidden;text-overflow:ellipsis">${conv.title || 'Percakapan'}</span>`;
    el.onclick = () => loadConversation(conv.id);
    list.appendChild(el);
  });
}

function saveConversations() {
  localStorage.setItem('yogzzjs_convs', JSON.stringify(conversations));
}

function loadConversation(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentConvId = id;
  document.getElementById('welcomeScreen').style.display = 'none';
  document.getElementById('chatTitle').textContent = conv.title || 'Percakapan';
  document.getElementById('chatInner').querySelectorAll('.message').forEach(m => m.remove());
  conv.messages.forEach(m => appendBubble(m.role, m.content, false));
  renderHistory();
  scrollBottom();
  if (window.innerWidth < 700) toggleSidebar();
}

function newChat() {
  currentConvId = null;
  document.getElementById('welcomeScreen').style.display = 'flex';
  document.getElementById('chatTitle').textContent = 'Percakapan Baru';
  document.getElementById('chatInner').querySelectorAll('.message').forEach(m => m.remove());
  renderHistory();
  document.getElementById('msgInput').focus();
  if (window.innerWidth < 700) toggleSidebar();
}

// ── SEND ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('welcomeScreen').style.display = 'none';

  if (!currentConvId) {
    currentConvId = 'conv_' + Date.now();
    conversations.push({ id: currentConvId, title: text.slice(0, 42), messages: [] });
    document.getElementById('chatTitle').textContent = text.slice(0, 42);
  }

  const conv = conversations.find(c => c.id === currentConvId);
  conv.messages.push({ role: 'user', content: text });
  saveConversations();
  renderHistory();

  appendBubble('user', text);
  scrollBottom();

  const typingEl = appendTyping();
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const url = `${API_BASE}?q=${encodeURIComponent(text)}&session=${encodeURIComponent(session)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    typingEl.remove();

    const reply = data.result || data.response || data.message || data.text || data.answer
      || (data.data && (data.data.result || data.data.response || data.data.message))
      || JSON.stringify(data);

    conv.messages.push({ role: 'ai', content: reply });
    saveConversations();
    appendBubble('ai', reply);
    scrollBottom();
  } catch (err) {
    typingEl.remove();
    appendBubble('ai', `**Gagal terhubung ke API**\n\nError: \`${err.message}\`\n\nPastikan jaringan aktif dan API dapat diakses.`);
    scrollBottom();
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── BUBBLES ──
function makeSVGAvatar(role) {
  const el = document.createElement('div');
  el.className = `avatar ${role}`;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.setAttribute('width', '20'); svg.setAttribute('height', '20');
  const use = document.createElementNS('http://www.w3.org/2000/svg', 'use');
  use.setAttribute('href', role === 'ai' ? '#icon-ai-avatar' : '#icon-user-avatar');
  svg.appendChild(use);
  el.appendChild(svg);
  return el;
}

function appendBubble(role, content, animate = true) {
  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (!animate) div.style.animation = 'none';

  div.appendChild(makeSVGAvatar(role));

  const wrap = document.createElement('div');
  wrap.style.cssText = `display:flex;flex-direction:column;max-width:calc(100% - 50px);${role==='user'?'align-items:flex-end':''}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = renderMarkdown(content);
  bubble.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));

  // code copy buttons
  bubble.querySelectorAll('pre').forEach(pre => {
    const lang = (pre.querySelector('code')?.className || '').replace(/language-|hljs/g,'').trim() || 'code';
    const w = document.createElement('div');
    w.className = 'code-block-wrap';
    const h = document.createElement('div');
    h.className = 'code-header';
    h.innerHTML = `<span style="display:flex;align-items:center;gap:6px">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      ${lang}</span>
      <button class="copy-btn" onclick="copyCode(this)">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        Salin
      </button>`;
    pre.parentNode.insertBefore(w, pre);
    w.appendChild(h);
    w.appendChild(pre);
  });

  wrap.appendChild(bubble);

  if (role === 'ai') {
    const actions = document.createElement('div');
    actions.className = 'msg-actions';
    actions.innerHTML = `<button class="action-btn" onclick="copyText(this,\`${escapeBacktick(content)}\`)">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      Salin respons</button>`;
    wrap.appendChild(actions);
  }

  div.appendChild(wrap);
  inner.appendChild(div);
  return div;
}

function appendTyping() {
  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = 'message ai';
  div.innerHTML = '';
  div.appendChild(makeSVGAvatar('ai'));
  const b = document.createElement('div');
  b.className = 'bubble';
  b.style.padding = '14px 16px';
  b.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
  div.appendChild(b);
  inner.appendChild(div);
  scrollBottom();
  return div;
}

// ── MARKDOWN ──
function renderMarkdown(text) {
  if (!text) return '';
  let h = text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, (_,l,c)=>`<pre><code class="language-${l||'plaintext'}">${escapeHtml(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^\* (.+)$/gm,'<li>$1</li>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
  h = h.replace(/(<li>.*?<\/li>)+/gs, m=>`<ul>${m}</ul>`);
  return `<p>${h}</p>`;
}

function escapeHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escapeBacktick(s){ return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

// ── UTILS ──
function scrollBottom() {
  const w = document.getElementById('chatWrapper');
  setTimeout(()=>w.scrollTo({top:w.scrollHeight,behavior:'smooth'}),50);
}
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(()=>showToast('Teks berhasil disalin')).catch(()=>{});
}
function copyCode(btn) {
  const code = btn.closest('.code-block-wrap').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(()=>{
    btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Tersalin`;
    setTimeout(()=>{ btn.innerHTML = `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> Salin`; }, 2000);
  });
}
function useSuggestion(el) {
  const text = el.querySelector('.s-text').textContent;
  document.getElementById('msgInput').value = text;
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}

// ── INIT ──
renderHistory();
document.getElementById('msgInput').focus();
</script>
</body>
</html>
