<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yogzz AI & News</title>
    <style>
        :root {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --header-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #5f6368;
            --border: #dadce0;
            --input-bg: #f1f3f4;
            --msg-ai-bg: #e8eaed;
            --accent: #0088cc;
            --msg-user-bg: #0088cc;
        }

        [data-theme="dark"] {
            --bg-body: #121212;
            --bg-container: #1e1e1e;
            --header-bg: #1e1e1e;
            --text-main: #e8eaed;
            --text-muted: #bdc1c6;
            --border: #3c4043;
            --input-bg: #303134;
            --msg-ai-bg: #3c4043;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); height: 100vh; transition: 0.3s; overflow: hidden; }

        /* Loading Overlay Premium */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-container); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .loader-dots { display: flex; gap: 8px; }
        .loader-dots div { width: 15px; height: 15px; background: var(--accent); border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .loader-dots div:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots div:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { to { transform: translateY(-15px); opacity: 0.3; } }

        .chat-container {
            width: 100%; max-width: 600px; height: 100%; margin: 0 auto; background-color: var(--bg-container);
            display: flex; flex-direction: column; position: relative; border-left: 1px solid var(--border); border-right: 1px solid var(--border);
        }

        /* Header & Logo */
        .header {
            padding: 10px 15px; background: var(--header-bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .ai-logo {
            width: 38px; height: 38px; background: linear-gradient(135deg, #0088cc, #00d2ff);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,136,204,0.3);
        }

        /* Pages Area */
        .content-area { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: flex; flex-direction: column; }

        /* News Card */
        .news-card {
            display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border);
            text-decoration: none; color: inherit; align-items: center;
        }
        .news-info { flex: 1; }
        .news-title { font-size: 0.95rem; font-weight: 600; line-height: 1.3; margin-bottom: 5px; color: var(--text-main); }
        .news-img { width: 85px; height: 85px; border-radius: 10px; object-fit: cover; background: #eee; flex-shrink: 0; border: 1px solid var(--border); }

        /* Chat Bubbles Style */
        .msg { padding: 12px 16px; border-radius: 20px; max-width: 85%; font-size: 0.95rem; margin-bottom: 12px; line-height: 1.4; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .user { align-self: flex-end; background: var(--msg-user-bg); color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--msg-ai-bg); border-bottom-left-radius: 2px; }
        .chat-image { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* Bottom Bar */
        .input-bar {
            position: absolute; bottom: 0; width: 100%; padding: 12px 15px; background: var(--bg-container);
            border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
            padding-bottom: max(15px, env(safe-area-inset-bottom));
        }
        .input-wrapper { flex: 1; background: var(--input-bg); border-radius: 25px; display: flex; align-items: center; padding: 0 15px; border: 1px solid var(--border); }
        .input-wrapper input { flex: 1; border: none; background: transparent; padding: 12px 0; outline: none; color: var(--text-main); font-size: 1rem; }
        
        .btn-action { background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 5px; transition: 0.2s; display: flex; align-items: center; }
        .btn-action:active { transform: scale(0.9); }
        .btn-send { color: var(--accent); }
    </style>
</head>
<body data-theme="light">

<div id="loading-overlay">
    <div class="ai-logo" style="width: 60px; height: 60px; font-size: 2rem; margin-bottom: 30px;">Y</div>
    <div class="loader-dots">
        <div></div><div></div><div></div>
    </div>
</div>

<div class="chat-container">
    <div class="header">
        <div class="logo-box">
            <div class="ai-logo">Y</div>
            <b id="header-label" style="font-size: 1.1rem;">Yogzz AI</b>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-action" onclick="switchPage()" title="Berita">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 5v14H5V5h14m0-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
            </button>
            <button class="btn-action" onclick="toggleTheme()" title="Tema">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
            </button>
        </div>
    </div>

    <div class="content-area" id="scroll-box">
        <div id="page-chat" class="page active">
            <div class="msg ai">Halo Yogzz! Ada yang bisa saya bantu hari ini?</div>
        </div>

        <div id="page-news" class="page">
            <div id="news-feed"></div>
        </div>
    </div>

    <div class="input-bar" id="input-ui">
        <input type="file" id="file-input" hidden accept="image/*">
        <button class="btn-action" onclick="document.getElementById('file-input').click()">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
        </button>
        <div class="input-wrapper">
            <input type="text" id="msg-input" placeholder="Tulis pesan ke AI...">
        </div>
        <button class="btn-action btn-send" onclick="handleSend()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
    </div>
</div>

<script>
    const API_AI = "https://api.siputzx.my.id/api/ai/gemini-lite?prompt=";
    const API_NEWS = "https://api.siputzx.my.id/api/berita/liputan6";
    let isNews = false;

    // Loading Splash Screen
    window.onload = () => {
        setTimeout(() => {
            const loader = document.getElementById('loading-overlay');
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }, 2000);
    };

    function showMiniLoading() {
        const loader = document.getElementById('loading-overlay');
        loader.style.display = 'flex';
        loader.style.opacity = '1';
        setTimeout(() => {
            loader.style.opacity = '0';
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }, 800);
    }

    function toggleTheme() {
        const b = document.body;
        b.setAttribute('data-theme', b.getAttribute('data-theme') === 'light' ? 'dark' : 'light');
    }

    function switchPage() {
        showMiniLoading();
        isNews = !isNews;
        document.getElementById('page-chat').classList.toggle('active', !isNews);
        document.getElementById('page-news').classList.toggle('active', isNews);
        document.getElementById('input-ui').style.display = isNews ? 'none' : 'flex';
        document.getElementById('header-label').innerText = isNews ? 'Liputan6 News' : 'Yogzz AI';
        if(isNews) loadNews();
    }

    async function loadNews() {
        const feed = document.getElementById('news-feed');
        feed.innerHTML = '<p style="text-align: center; padding: 20px; color: var(--text-muted);">Sedang mencari berita hangat...</p>';
        try {
            const res = await fetch(API_NEWS);
            const json = await res.json();
            feed.innerHTML = "";
            
            json.data.forEach(item => {
                // Trik gambar: Kadang API butuh full URL atau thumbnail khusus
                const imgUrl = item.thumbnail || item.thumb || item.img || "https://placehold.co/400x400?text=Liputan6";
                
                feed.innerHTML += `
                    <a href="${item.url}" target="_blank" class="news-card">
                        <div class="news-info">
                            <div class="news-title">${item.title}</div>
                            <div style="font-size: 0.75rem; color: var(--accent); font-weight: 500;">Liputan6 • Baru saja</div>
                        </div>
                        <img src="${imgUrl}" class="news-img" onerror="this.src='https://placehold.co/100x100?text=No+Image'">
                    </a>
                `;
            });
        } catch (e) { feed.innerHTML = "<p style='text-align:center;'>Gagal mengambil berita.</p>"; }
    }

    async function handleSend() {
        const inp = document.getElementById('msg-input');
        if(!inp.value.trim()) return;
        const txt = inp.value;
        addMsg(txt, 'user');
        inp.value = "";

        // Efek AI sedang mengetik
        const typingId = "typing-" + Date.now();
        const typingDiv = document.createElement('div');
        typingDiv.className = 'msg ai';
        typingDiv.id = typingId;
        typingDiv.innerText = "Yogzz AI sedang berpikir...";
        document.getElementById('page-chat').appendChild(typingDiv);
        scrollDown();

        try {
            const res = await fetch(API_AI + encodeURIComponent(txt));
            const json = await res.json();
            const reply = json.data?.parts?.[0]?.text || "Maaf Yogzz, ada gangguan teknis.";
            document.getElementById(typingId).innerText = reply;
        } catch(e) { 
            document.getElementById(typingId).innerText = "Maaf, server sedang sibuk."; 
        }
        scrollDown();
    }

    function addMsg(t, s) {
        const d = document.createElement('div');
        d.className = `msg ${s}`;
        d.innerText = t;
        document.getElementById('page-chat').appendChild(d);
        scrollDown();
    }

    function scrollDown() {
        const box = document.getElementById('scroll-box');
        box.scrollTop = box.scrollHeight;
    }

    // Input File / Gambar
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                const d = document.createElement('div');
                d.className = 'msg user';
                d.innerHTML = `<img src="${event.target.result}" class="chat-image">`;
                document.getElementById('page-chat').appendChild(d);
                scrollDown();
            };
            reader.readAsDataURL(file);
        }
    });

    document.getElementById('msg-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
