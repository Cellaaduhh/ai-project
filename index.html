<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yogzz AI Premium</title>
    <style>
        :root {
            --gemini-grad: linear-gradient(135deg, #4285f4, #9b72cb, #d96570);
            --bg-dark: #070b14;
            --card-bg: rgba(23, 28, 41, 0.8);
            --text-color: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }

        body { 
            background: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, rgba(66, 133, 244, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(155, 114, 203, 0.1) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            color: var(--text-color);
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }

        /* HEADER DENGAN LOGO GEMINI STYLE */
        .header {
            padding: 15px 20px;
            background: rgba(7, 11, 20, 0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gemini-logo {
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            background: var(--gemini-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        /* AREA CHAT */
        #chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.6;
            border-radius: 20px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .ai { 
            background: rgba(255, 255, 255, 0.05); 
            align-self: flex-start; 
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }

        .user { 
            background: var(--gemini-grad); 
            color: white; 
            align-self: flex-end; 
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(155, 114, 203, 0.2);
        }

        /* Styling Bold */
        strong, b { color: #fff; font-weight: 700; }

        /* INPUT BAR */
        .input-section {
            padding: 15px;
            background: rgba(7, 11, 20, 0.8);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 0 15px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }

        input {
            width: 100%;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.95rem;
        }

        .circle-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: white;
        }

        #mic-btn { background: rgba(255,255,255,0.1); }
        #send-btn { background: var(--gemini-grad); }
        .circle-btn:active { transform: scale(0.9); }

        /* Scrollbar */
        #chat-area::-webkit-scrollbar { width: 3px; }
        #chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="gemini-logo">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2L12 9.5L12 2Z" fill="url(#grad1)"/>
                <defs>
                    <linearGradient id="grad1" x1="2" y1="2" x2="22" y2="22" gradientUnits="userSpaceOnUse">
                        <stop stop-color="#4285F4"/>
                        <stop offset="0.5" stop-color="#9B72CB"/>
                        <stop offset="1" stop-color="#D96570"/>
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <div class="header-title">Yogzz AI</div>
    </div>

    <div id="chat-area">
        <div class="msg ai">Halo Yogzz! Saya asisten AI kamu. Gunakan tombol mic untuk bicara atau ketik pesanmu di bawah.</div>
    </div>

    <div class="input-section">
        <button id="mic-btn" class="circle-btn" onclick="startVoice()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <div class="input-wrapper">
            <input type="text" id="user-input" placeholder="Tanyakan sesuatu..." autocomplete="off">
        </div>
        <button id="send-btn" class="circle-btn" onclick="handleSend()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polyline points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
    </div>
</div>

<script>
    const API_URL = "https://api.siputzx.my.id/api/ai/gemini-lite?prompt=";
    const chatArea = document.getElementById('chat-area');
    const inputMsg = document.getElementById('user-input');

    // Fungsi tebal otomatis
    function formatText(t) {
        return t.replace(/\*\*(.*?)\*\*|\*(.*?)\*/g, "<strong>$1$2</strong>");
    }

    async function handleSend() {
        const text = inputMsg.value.trim();
        if(!text) return;

        addBubble(text, 'user');
        inputMsg.value = "";

        const loadId = "ai-" + Date.now();
        addBubble("Berpikir...", 'ai', loadId);

        try {
            const res = await fetch(API_URL + encodeURIComponent(text));
            const json = await res.json();
            const reply = json.data?.parts?.[0]?.text || "Maaf, ada gangguan.";
            document.getElementById(loadId).innerHTML = formatText(reply);
        } catch(e) {
            document.getElementById(loadId).innerText = "Koneksi gagal.";
        }
        scrollDown();
    }

    function addBubble(txt, type, id = null) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        if(id) div.id = id;
        div.innerHTML = type === 'ai' ? formatText(txt) : txt;
        chatArea.appendChild(div);
        scrollDown();
    }

    function scrollDown() {
        chatArea.scrollTo({ top: chatArea.scrollHeight, behavior: 'smooth' });
    }

    // Suara
    function startVoice() {
        const Rec = window.SpeechRecognition || window.webkitSpeechRecognition;
        if(!Rec) return alert("Browser tidak support voice.");
        const recognition = new Rec();
        recognition.lang = 'id-ID';
        recognition.onstart = () => { document.getElementById('mic-btn').style.background = '#d96570'; };
        recognition.onresult = (e) => {
            inputMsg.value = e.results[0][0].transcript;
            handleSend();
        };
        recognition.onend = () => { document.getElementById('mic-btn').style.background = 'rgba(255,255,255,0.1)'; };
        recognition.start();
    }

    inputMsg.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>

</body>
</html>
