<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YogzzJS AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
:root {
  --bg:       #09090b;
  --sf:       #0f1117;
  --sf2:      #141820;
  --sf3:      #1a2030;
  --bd:       #1e2636;
  --bd2:      #273044;
  --tx:       #e4eaf4;
  --tx2:      #8c9ab5;
  --tx3:      #3d4f6a;
  --blue:     #3b82f6;
  --indigo:   #6366f1;
  --violet:   #8b5cf6;
  --green:    #10b981;
  --pink:     #ec4899;
  --cyan:     #06b6d4;
  --amber:    #f59e0b;
  --user-bg:  #0e1724;
  --user-bd:  #1a3254;
  --r:        var(--font);
  --font:     'Inter', system-ui, sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --sw:       258px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--tx); font-size: 14px; -webkit-font-smoothing: antialiased; }
button { font-family: var(--font); cursor: pointer; border: none; background: none; }
textarea { font-family: var(--font); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--bd2); border-radius: 4px; }

/* ── layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }

/* ═══════════ SIDEBAR ═══════════ */
.sidebar {
  width: var(--sw); min-width: var(--sw);
  background: var(--sf);
  border-right: 1px solid var(--bd);
  display: flex; flex-direction: column;
  transition: transform .28s cubic-bezier(.4,0,.2,1);
}
.sb-header {
  padding: 18px 14px 15px;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; gap: 10px;
}

/* Logo mark — neural network nodes */
.logo-mark {
  width: 36px; height: 36px; flex-shrink: 0;
  border-radius: 10px;
  background: #0b0f1c;
  border: 1px solid rgba(99,102,241,.3);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 3px rgba(99,102,241,.05), inset 0 1px 0 rgba(255,255,255,.04);
}
.logo-text { display: flex; flex-direction: column; gap: 1px; }
.logo-text .name {
  font-size: 15px; font-weight: 700; letter-spacing: -.5px; line-height: 1;
  background: linear-gradient(90deg,#c7d2fe,#a5b4fc 50%,#7dd3fc);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.logo-text .sub { font-size: 10px; color: var(--tx3); letter-spacing: .04em; }

.new-btn {
  margin: 11px 10px;
  padding: 9px 13px;
  background: var(--sf2); border: 1px solid var(--bd);
  border-radius: 10px; color: var(--tx2); font-size: 13px; font-weight: 500;
  display: flex; align-items: center; gap: 8px; transition: all .16s;
}
.new-btn:hover { background: var(--sf3); border-color: var(--bd2); color: var(--tx); }

.sb-label { padding: 12px 15px 4px; font-size: 10px; font-weight: 600; color: var(--tx3); text-transform: uppercase; letter-spacing: .1em; }
.hist-list { flex: 1; overflow-y: auto; padding: 2px 8px 14px; }
.hist-item {
  padding: 8px 10px; border-radius: 7px; font-size: 12.5px; color: var(--tx2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 7px;
  transition: all .14s; cursor: pointer;
}
.hist-item svg { flex-shrink: 0; opacity: .4; }
.hist-item:hover { background: var(--sf3); color: var(--tx); }
.hist-item.active { background: rgba(99,102,241,.1); color: var(--tx); border: 1px solid rgba(99,102,241,.2); }

.sb-footer { padding: 10px; border-top: 1px solid var(--bd); }
.online-pill {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px; background: var(--sf2); border: 1px solid var(--bd);
  border-radius: 9px; font-size: 11px; color: var(--tx3);
}
.online-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; animation: pdot 2.4s infinite; }
@keyframes pdot { 0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)} 50%{box-shadow:0 0 0 5px rgba(16,185,129,0)} }

/* ═══════════ MAIN ═══════════ */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  height: 54px; padding: 0 20px;
  border-bottom: 1px solid var(--bd);
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(9,9,11,.82); backdrop-filter: blur(16px);
  flex-shrink: 0;
}
.topbar-l { display: flex; align-items: center; gap: 10px; }
.hamburger { padding: 6px; border-radius: 7px; color: var(--tx2); display: none; transition: background .14s; }
.hamburger:hover { background: var(--sf2); }

.model-pill {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 12px;
  background: var(--sf2); border: 1px solid var(--bd2);
  border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--tx2);
}
.model-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--indigo); box-shadow: 0 0 8px var(--indigo); }
.topbar-title { font-size: 12.5px; color: var(--tx3); max-width: 260px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── chat ── */
.chat-wrap { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
.chat-inner { max-width: 760px; margin: 0 auto; padding: 28px 20px 60px; }

/* ── WELCOME ── */
.welcome {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 65vh; text-align: center; padding: 40px 20px;
  animation: fup .45s ease both;
}
@keyframes fup { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

.w-logo { position: relative; margin-bottom: 26px; }
.w-logo-box {
  width: 80px; height: 80px; border-radius: 22px;
  background: linear-gradient(145deg, #0c1020, #111828);
  border: 1px solid rgba(99,102,241,.25);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 0 6px rgba(99,102,241,.04), 0 0 0 14px rgba(99,102,241,.02), 0 14px 48px rgba(0,0,0,.55);
}
.w-logo-ring {
  position: absolute; inset: -10px; border-radius: 32px;
  border: 1.5px solid transparent;
  background:
    linear-gradient(#0c1020,#0c1020) padding-box,
    conic-gradient(from 0deg,#6366f1,#8b5cf6,#3b82f6,#06b6d4,#ec4899,#6366f1) border-box;
  animation: spin 7s linear infinite; opacity: .5;
}
@keyframes spin { to{transform:rotate(360deg)} }

.welcome h1 { font-size: 26px; font-weight: 700; letter-spacing: -.6px; margin-bottom: 10px; line-height: 1.25; }
.welcome h1 .gr {
  background: linear-gradient(90deg,#818cf8,#a78bfa 50%,#60a5fa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.welcome p { font-size: 14px; color: var(--tx2); max-width: 400px; line-height: 1.7; margin-bottom: 30px; }

.sug-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 10px; width: 100%; max-width: 500px; }
.sug-card {
  background: var(--sf); border: 1px solid var(--bd); border-radius: 13px;
  padding: 13px 14px; cursor: pointer; text-align: left;
  display: flex; gap: 11px; align-items: flex-start; transition: all .18s;
}
.sug-card:hover { border-color: rgba(99,102,241,.4); background: var(--sf2); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(0,0,0,.3); }
.sug-ico {
  width: 30px; height: 30px; border-radius: 7px;
  background: var(--sf3); border: 1px solid var(--bd2);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.sug-txt { font-size: 12px; color: var(--tx2); line-height: 1.55; }

/* ── MESSAGES ── */
.message { display: flex; gap: 12px; padding: 8px 0; animation: fup .25s ease both; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 34px; height: 34px; border-radius: 10px;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px;
}
.avatar.ai  { background: linear-gradient(145deg,#0b0f1c,#111828); border: 1px solid rgba(99,102,241,.28); }
.avatar.usr { background: var(--sf2); border: 1px solid var(--bd2); }

.bwrap { display: flex; flex-direction: column; max-width: min(580px,calc(100% - 50px)); }
.message.user .bwrap { align-items: flex-end; }

.bubble { padding: 11px 15px; border-radius: 14px; line-height: 1.75; font-size: 14px; }
.message.ai  .bubble { background: var(--sf); border: 1px solid var(--bd); border-top-left-radius: 3px; }
.message.user .bubble { background: var(--user-bg); border: 1px solid var(--user-bd); border-top-right-radius: 3px; }

.bubble p { margin: 0 0 9px; }
.bubble p:last-child { margin-bottom: 0; }
.bubble h1,.bubble h2,.bubble h3 { font-weight: 600; margin: 14px 0 5px; color: #fff; }
.bubble h1{font-size:18px} .bubble h2{font-size:16px} .bubble h3{font-size:14px}
.bubble ul,.bubble ol { padding-left: 18px; margin: 5px 0 9px; }
.bubble li { margin: 3px 0; }
.bubble strong { font-weight: 600; color: #fff; }
.bubble em { color: var(--tx2); font-style: italic; }
.bubble code { font-family: var(--mono); font-size: 12px; background: #111828; color: #a5b4fc; padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(99,102,241,.18); }
.bubble pre { margin: 10px 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--bd2); }
.bubble pre code { background: transparent; color: inherit; padding: 0; border: none; font-size: 12.5px; }
.bubble blockquote { border-left: 3px solid var(--indigo); padding-left: 12px; color: var(--tx2); margin: 8px 0; }
.bubble hr { border: none; border-top: 1px solid var(--bd); margin: 11px 0; }
.bubble a { color: #818cf8; text-decoration: none; }
.bubble a:hover { text-decoration: underline; }
.bubble table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 13px; }
.bubble th,.bubble td { border: 1px solid var(--bd); padding: 7px 11px; }
.bubble th { background: var(--sf2); font-weight: 600; }

.code-wrap {}
.code-head {
  display: flex; align-items: center; justify-content: space-between;
  background: #0c1018; padding: 7px 12px;
  font-family: var(--mono); font-size: 11px; color: var(--tx3);
  border-radius: 10px 10px 0 0; border-bottom: 1px solid var(--bd);
}
.code-head-l { display: flex; align-items: center; gap: 6px; }
.cp-btn {
  background: none; border: 1px solid var(--bd); color: var(--tx2);
  padding: 3px 9px; border-radius: 5px; font-size: 10px; font-family: var(--font);
  display: flex; align-items: center; gap: 4px; transition: all .16s; cursor: pointer;
}
.cp-btn:hover { border-color: var(--indigo); color: var(--indigo); }

.msg-acts { display: flex; gap: 3px; margin-top: 5px; opacity: 0; transition: opacity .18s; }
.message:hover .msg-acts { opacity: 1; }
.act-btn {
  display: flex; align-items: center; gap: 4px;
  padding: 4px 8px; border-radius: 6px; font-size: 11px; color: var(--tx3);
  border: 1px solid transparent; transition: all .16s;
}
.act-btn:hover { background: var(--sf2); border-color: var(--bd); color: var(--tx); }

/* ═══════════════════════════════════════
   GEMINI-STYLE SPINNING STAR LOADER
═══════════════════════════════════════ */
.gem-loader { display: flex; align-items: center; gap: 12px; padding: 4px 0; }

.star-wrap { position: relative; width: 30px; height: 30px; flex-shrink: 0; }

/* Ambient glow */
.star-glow {
  position: absolute; inset: -6px; border-radius: 50%;
  background: radial-gradient(circle, rgba(99,102,241,.3) 0%, rgba(139,92,246,.1) 50%, transparent 70%);
  animation: glow-beat 1.6s ease-in-out infinite;
}
@keyframes glow-beat { 0%,100%{opacity:.5;transform:scale(.9)} 50%{opacity:1;transform:scale(1.1)} }

/* Horizontal bar of star */
.star-h {
  position: absolute; left: 0; top: 50%; margin-top: -5px;
  width: 30px; height: 10px; border-radius: 5px;
  background: conic-gradient(from var(--a,0deg), #6366f1, #8b5cf6, #ec4899, #3b82f6, #06b6d4, #6366f1);
  animation: spin-piece 2s cubic-bezier(.55,0,.45,1) infinite;
}
/* Vertical bar of star */
.star-v {
  position: absolute; left: 50%; top: 0; margin-left: -5px;
  width: 10px; height: 30px; border-radius: 5px;
  background: conic-gradient(from 90deg, #8b5cf6, #ec4899, #f59e0b, #3b82f6, #06b6d4, #8b5cf6);
  animation: spin-piece 2s cubic-bezier(.55,0,.45,1) infinite;
}
/* Diagonal bar 1 */
.star-d1 {
  position: absolute; left: 50%; top: 50%; margin: -4px 0 0 -15px;
  width: 30px; height: 8px; border-radius: 4px;
  background: conic-gradient(from 45deg, #3b82f6, #6366f1, #a78bfa, #ec4899, #3b82f6);
  transform-origin: center center;
  animation: spin-piece 2s cubic-bezier(.55,0,.45,1) infinite;
  animation-delay: -.5s;
}
/* Diagonal bar 2 */
.star-d2 {
  position: absolute; left: 50%; top: 50%; margin: -4px 0 0 -15px;
  width: 30px; height: 8px; border-radius: 4px;
  background: conic-gradient(from 135deg, #06b6d4, #3b82f6, #6366f1, #a78bfa, #06b6d4);
  transform-origin: center center;
  animation: spin-piece 2s cubic-bezier(.55,0,.45,1) infinite;
  animation-delay: -1s;
}

@keyframes spin-piece {
  0%   { transform: rotate(0deg)   scaleX(1); }
  40%  { transform: rotate(145deg) scaleX(.12); }
  50%  { transform: rotate(180deg) scaleX(.08); }
  60%  { transform: rotate(215deg) scaleX(.12); }
  100% { transform: rotate(360deg) scaleX(1); }
}

.think-txt {
  font-size: 13px; color: var(--tx3); letter-spacing: .01em;
  background: linear-gradient(90deg, var(--indigo), var(--violet), var(--blue), var(--cyan));
  background-size: 200%;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  animation: shimmer 2s linear infinite;
}
@keyframes shimmer { 0%{background-position:100%} 100%{background-position:-100%} }

/* ═══════════ INPUT ═══════════ */
.input-area {
  padding: 12px 20px 18px;
  border-top: 1px solid var(--bd);
  background: rgba(9,9,11,.88); backdrop-filter: blur(14px);
  flex-shrink: 0;
}
.input-inner { max-width: 760px; margin: 0 auto; }
.input-box {
  display: flex; align-items: flex-end; gap: 9px;
  background: var(--sf); border: 1px solid var(--bd2);
  border-radius: 14px; padding: 10px 10px 10px 15px;
  transition: border-color .18s, box-shadow .18s;
}
.input-box:focus-within { border-color: rgba(99,102,241,.45); box-shadow: 0 0 0 3px rgba(99,102,241,.07); }
textarea {
  flex: 1; background: none; border: none; outline: none; resize: none;
  font-size: 14px; color: var(--tx); max-height: 160px; min-height: 24px; line-height: 1.6; padding: 2px 0;
}
textarea::placeholder { color: var(--tx3); }

.send-btn {
  width: 36px; height: 36px; border-radius: 9px;
  background: linear-gradient(135deg, var(--indigo), var(--blue));
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  transition: all .18s; box-shadow: 0 2px 12px rgba(99,102,241,.3);
}
.send-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 4px 20px rgba(99,102,241,.45); }
.send-btn:disabled { opacity: .3; cursor: not-allowed; transform: none; box-shadow: none; }

.input-foot { margin-top: 8px; text-align: center; font-size: 11px; color: var(--tx3); }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(6px);
  background: var(--sf3); border: 1px solid var(--bd2); color: var(--tx);
  padding: 8px 14px; border-radius: 9px; font-size: 12px;
  opacity: 0; transition: all .2s; pointer-events: none; z-index: 999;
  display: flex; align-items: center; gap: 6px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MOBILE ── */
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 10; }
@media (max-width: 680px) {
  .sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 20; transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); box-shadow: 8px 0 40px rgba(0,0,0,.6); }
  .overlay.show { display: block; }
  .hamburger { display: flex; }
  .sug-grid { grid-template-columns: 1fr; }
  .topbar-title { display: none; }
}
</style>
</head>
<body>
<div class="app">

<!-- ════════ SIDEBAR ════════ -->
<aside class="sidebar" id="sidebar">
  <div class="sb-header">

    <!-- Professional AI Logo: neural network hub-and-spoke -->
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <!-- spokes -->
        <line x1="11" y1="7.8"  x2="11"   y2="2"    stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
        <line x1="13.8" y1="9.2" x2="19"   y2="5.2"  stroke="#a5b4fc" stroke-width="1" stroke-linecap="round"/>
        <line x1="13.8" y1="12.8" x2="19"  y2="16.8" stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>
        <line x1="11" y1="14.2" x2="11"   y2="20"   stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
        <line x1="8.2" y1="12.8" x2="3"   y2="16.8" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round"/>
        <line x1="8.2" y1="9.2"  x2="3"   y2="5.2"  stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>
        <!-- outer dots -->
        <circle cx="11" cy="1.5"  r="1.5" fill="#c7d2fe"/>
        <circle cx="20" cy="4.5"  r="1.5" fill="#a5b4fc"/>
        <circle cx="20" cy="17.5" r="1.5" fill="#818cf8"/>
        <circle cx="11" cy="20.5" r="1.5" fill="#c7d2fe"/>
        <circle cx="2"  cy="17.5" r="1.5" fill="#a5b4fc"/>
        <circle cx="2"  cy="4.5"  r="1.5" fill="#818cf8"/>
        <!-- center hub -->
        <circle cx="11" cy="11" r="3.6" fill="url(#hg)"/>
        <circle cx="11" cy="11" r="3.6" stroke="rgba(99,102,241,.5)" stroke-width=".8"/>
        <!-- inner detail -->
        <circle cx="11" cy="11" r="1.4" fill="#e0e7ff" opacity=".9"/>
        <defs>
          <radialGradient id="hg" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#818cf8"/>
            <stop offset="100%" stop-color="#4338ca"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <div class="logo-text">
      <span class="name">YogzzJS</span>
      <span class="sub">AI Assistant</span>
    </div>
  </div>

  <button class="new-btn" onclick="newChat()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Chat Baru
  </button>

  <div class="sb-label">Riwayat</div>
  <div class="hist-list" id="histList"></div>

  <div class="sb-footer">
    <div class="online-pill">
      <div class="online-dot"></div>
      <span style="flex:1;display:flex;gap:4px;overflow:hidden">
        <span>Session</span>
        <span id="sessId" style="font-family:var(--mono);font-size:10px;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1"></span>
      </span>
    </div>
  </div>
</aside>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- ════════ MAIN ════════ -->
<main class="main">
  <div class="topbar">
    <div class="topbar-l">
      <button class="hamburger" onclick="toggleSidebar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="3" y1="8" x2="21" y2="8"/><line x1="3" y1="16" x2="21" y2="16"/>
        </svg>
      </button>
      <div class="model-pill">
        <div class="model-dot"></div>
        YogzzJS AI
      </div>
    </div>
    <div class="topbar-title" id="chatTitle">Percakapan Baru</div>
  </div>

  <div class="chat-wrap" id="chatWrap">
    <div class="chat-inner" id="chatInner">

      <!-- Welcome screen -->
      <div class="welcome" id="welcomeScr">
        <div class="w-logo">
          <div class="w-logo-ring"></div>
          <div class="w-logo-box">
            <!-- Large welcome logo -->
            <svg width="46" height="46" viewBox="0 0 46 46" fill="none">
              <!-- dashed orbit -->
              <circle cx="23" cy="23" r="20" stroke="url(#wbd)" stroke-width="1" stroke-dasharray="4 3" opacity=".35"/>
              <!-- spokes -->
              <line x1="23" y1="16.5" x2="23"   y2="5"    stroke="#818cf8" stroke-width="1.2" stroke-linecap="round" opacity=".85"/>

              <!-- outer nodes -->

<!-- Toast -->
<div class="toast" id="toast">
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg"></span>
</div>

<script>
/* ── STATE ── */
const API_URL = 'https://calista-newapi.vercel.app/api/ai/kuroneko';
let sess   = localStorage.getItem('ygz_s') || mkSess();
let convs  = JSON.parse(localStorage.getItem('ygz_c') || '[]');
let curId  = null;
let busy   = false;

localStorage.setItem('ygz_s', sess);
document.getElementById('sessId').textContent = sess;

function mkSess() {
  const s = 'ygz_' + Math.random().toString(36).slice(2,9) + Date.now().toString(36).slice(-4);
  localStorage.setItem('ygz_s', s); return s;
}

/* ── SIDEBAR ── */
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

/* ── HISTORY ── */
function renderHist() {
  const el = document.getElementById('histList');
  if (!convs.length) {
    el.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--tx3)">Belum ada riwayat</div>';
    return;
  }
  el.innerHTML = [...convs].reverse().map(c => `
    <div class="hist-item${c.id===curId?' active':''}" onclick="loadConv('${c.id}')">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13.5 9.5A1.5 1.5 0 0112 11H5l-3 3V3.5A1.5 1.5 0 013.5 2h8.5A1.5 1.5 0 0113.5 3.5v6z"/>
      </svg>
      <span style="overflow:hidden;text-overflow:ellipsis">${xss(c.title||'Percakapan')}</span>
    </div>`).join('');
}
function saveConvs() { localStorage.setItem('ygz_c', JSON.stringify(convs)); }

function loadConv(id) {
  const c = convs.find(x=>x.id===id); if (!c) return;
  curId = id;
  document.getElementById('welcomeScr').style.display = 'none';
  document.getElementById('chatTitle').textContent = c.title || 'Percakapan';
  document.getElementById('chatInner').querySelectorAll('.message').forEach(m=>m.remove());
  c.messages.forEach(m => addBubble(m.role, m.content, false));
  renderHist(); scrollBot();
  if (window.innerWidth < 680) closeSidebar();
}

function newChat() {
  curId = null;
  document.getElementById('welcomeScr').style.display = 'flex';
  document.getElementById('chatTitle').textContent = 'Percakapan Baru';
  document.getElementById('chatInner').querySelectorAll('.message').forEach(m=>m.remove());
  renderHist();
  document.getElementById('msgIn').focus();
  if (window.innerWidth < 680) closeSidebar();
}

/* ── INPUT ── */
function handleKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,160)+'px'; }

/* ── SEND ── */
async function send() {
  const inp = document.getElementById('msgIn');
  const txt = inp.value.trim();
  if (!txt || busy) return;

  inp.value=''; inp.style.height='auto';
  document.getElementById('welcomeScr').style.display = 'none';

  if (!curId) {
    curId = 'c'+Date.now();
    convs.push({ id:curId, title:txt.slice(0,44), messages:[] });
    document.getElementById('chatTitle').textContent = txt.slice(0,44);
  }

  const conv = convs.find(x=>x.id===curId);
  conv.messages.push({ role:'user', content:txt });
  saveConvs(); renderHist();
  addBubble('user', txt);
  scrollBot();

  const loader = addLoader();
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  try {
    const r = await fetch(`${API_URL}?q=${encodeURIComponent(txt)}&session=${encodeURIComponent(sess)}`);
    if (!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    loader.remove();

    const reply = d.result||d.response||d.message||d.text||d.answer
      ||(d.data&&(d.data.result||d.data.response||d.data.message))
      ||JSON.stringify(d);

    conv.messages.push({ role:'ai', content:reply });
    saveConvs();
    addBubble('ai', reply);
    scrollBot();
  } catch(e) {
    loader.remove();
    addBubble('ai', '**Gagal menghubungi API**\n\nError: `'+e.message+'`\n\nPastikan koneksi aktif lalu coba lagi.');
    scrollBot();
  } finally {
    busy=false;
    document.getElementById('sendBtn').disabled=false;
  }
}

/* ── GEMINI STAR LOADER ── */
function addLoader() {
  const wrap = document.createElement('div');
  wrap.className = 'message ai';
  wrap.innerHTML = `
    ${aiAvatar()}
    <div class="bwrap">
      <div class="bubble" style="background:transparent;border:none;padding:6px 0 8px">
        <div class="gem-loader">
          <div class="star-wrap">
            <div class="star-glow"></div>
            <div class="star-h"></div>
            <div class="star-v"></div>
            <div class="star-d1"></div>
            <div class="star-d2"></div>
          </div>
          <span class="think-txt">YogzzJS sedang berpikir…</span>
        </div>
      </div>
    </div>`;
  document.getElementById('chatInner').appendChild(wrap);
  scrollBot();
  return wrap;
}

/* ── AVATARS ── */
function aiAvatar() {
  return `<div class="avatar ai">
    <svg width="19" height="19" viewBox="0 0 22 22" fill="none">
      <line x1="11" y1="7.8"  x2="11"   y2="2"    stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
      <line x1="13.8" y1="9.2" x2="19"   y2="5.2"  stroke="#a5b4fc" stroke-width="1" stroke-linecap="round"/>
      <line x1="13.8" y1="12.8" x2="19"  y2="16.8" stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>
      <line x1="11" y1="14.2" x2="11"   y2="20"   stroke="#818cf8" stroke-width="1" stroke-linecap="round"/>
      <line x1="8.2" y1="12.8" x2="3"   y2="16.8" stroke="#a5b4fc" stroke-width="1" stroke-linecap="round"/>
      <line x1="8.2" y1="9.2"  x2="3"   y2="5.2"  stroke="#7dd3fc" stroke-width="1" stroke-linecap="round"/>
      <circle cx="11" cy="1.5"  r="1.4" fill="#c7d2fe"/>
      <circle cx="19.5" cy="4.5" r="1.4" fill="#a5b4fc"/>
      <circle cx="19.5" cy="17.5" r="1.4" fill="#818cf8"/>
      <circle cx="11" cy="20.5" r="1.4" fill="#c7d2fe"/>
      <circle cx="2.5" cy="17.5" r="1.4" fill="#a5b4fc"/>
      <circle cx="2.5" cy="4.5"  r="1.4" fill="#818cf8"/>
      <circle cx="11" cy="11" r="3.4" fill="url(#ag)"/>
      <circle cx="11" cy="11" r="1.3" fill="#e0e7ff" opacity=".9"/>
      <defs>
        <radialGradient id="ag" cx="35%" cy="35%" r="65%">
          <stop offset="0%" stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#4338ca"/>
        </radialGradient>
      </defs>
    </svg>
  </div>`;
}

function userAvatar() {
  return `<div class="avatar usr">
    <svg width="17" height="17" viewBox="0 0 18 18" fill="none">
      <circle cx="9" cy="6.5" r="3" stroke="#8c9ab5" stroke-width="1.4" fill="none"/>
      <path d="M2.5 17c0-3.59 2.91-6.5 6.5-6.5s6.5 2.91 6.5 6.5" stroke="#8c9ab5" stroke-width="1.4" stroke-linecap="round" fill="none"/>
    </svg>
  </div>`;
}

/* ── BUBBLES ── */
function addBubble(role, content, anim=true) {
  const inner = document.getElementById('chatInner');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (!anim) div.style.animation='none';

  const bwrap = document.createElement('div');
  bwrap.className = 'bwrap';
  if (role==='user') bwrap.style.alignItems='flex-end';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = md(content);
  bubble.querySelectorAll('pre code').forEach(b=>hljs.highlightElement(b));

  // Code headers
  bubble.querySelectorAll('pre').forEach(pre=>{
    const code = pre.querySelector('code');
    const lang = (code?.className||'').replace(/language-|hljs|\s/g,'').trim()||'code';
    const w = document.createElement('div');
    w.className='code-wrap';
    const h=document.createElement('div');
    h.className='code-head';
    h.innerHTML=`
      <div class="code-head-l">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        ${lang}
      </div>
      <button class="cp-btn" onclick="cpCode(this)">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
          <rect x="5.5" y="5.5" width="9" height="9" rx="2"/>
          <path d="M3.5 10.5h-1a1 1 0 01-1-1v-7a1 1 0 011-1h7a1 1 0 011 1v1"/>
        </svg>
        Salin
      </button>`;
    pre.parentNode.insertBefore(w,pre);
    w.appendChild(h); w.appendChild(pre);
  });

  bwrap.appendChild(bubble);

  if (role==='ai') {
    const acts=document.createElement('div');
    acts.className='msg-acts';
    const sc=escBt(content);
    acts.innerHTML=`<button class="act-btn" onclick="cpReply(this,\`${sc}\`)">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round">
        <rect x="5.5" y="5.5" width="9" height="9" rx="2"/>
        <path d="M3.5 10.5h-1a1 1 0 01-1-1v-7a1 1 0 011-1h7a1 1 0 011 1v1"/>
      </svg>Salin</button>`;
    bwrap.appendChild(acts);
  }

  div.innerHTML = role==='ai' ? aiAvatar() : userAvatar();
  div.appendChild(bwrap);
  inner.appendChild(div);
  return div;
}

/* ── MARKDOWN ── */
function md(t) {
  if (!t) return '';
  let h = t
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,l,c)=>`<pre><code class="language-${l||'plaintext'}">${xh(c.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/~~(.+?)~~/g,'<del>$1</del>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    .replace(/^---$/gm,'<hr>')
    .replace(/^[\*\-] (.+)$/gm,'<li>$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li>$1</li>')
    .replace(/\[(.+?)\]\((.+?)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
    .replace(/\n\n+/g,'</p><p>')
    .replace(/\n/g,'<br>');
  h = h.replace(/(<li>[\s\S]*?<\/li>)+/g,m=>`<ul>${m}</ul>`);
  return `<p>${h}</p>`;
}

/* ── HELPERS ── */
function scrollBot() {
  const w=document.getElementById('chatWrap');
  setTimeout(()=>w.scrollTo({top:w.scrollHeight,behavior:'smooth'}),50);
}
function toast(msg) {
  document.getElementById('toastMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
function cpReply(_,text) { navigator.clipboard.writeText(text).then(()=>toast('Respons disalin!')).catch(()=>{}); }
function cpCode(btn) {
  const code=btn.closest('.code-wrap').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(()=>{
    btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Tersalin`;
    setTimeout(()=>{ btn.innerHTML=`<svg width="10" height="10" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"><rect x="5.5" y="5.5" width="9" height="9" rx="2"/><path d="M3.5 10.5h-1a1 1 0 01-1-1v-7a1 1 0 011-1h7a1 1 0 011 1v1"/></svg> Salin`; },2000);
  });
}
function useSug(el) {
  const t=el.querySelector('.sug-txt').textContent;
  document.getElementById('msgIn').value=t;
  autoResize(document.getElementById('msgIn'));
  send();
}
function xss(s) { return s.replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function xh(s)  { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escBt(s){ return s.replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/\$/g,'\\$'); }

/* ── INIT ── */
renderHist();
document.getElementById('msgIn').focus();
</script>
